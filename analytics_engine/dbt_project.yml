name: 'analytics_engine'
version: '1.0.0'
config-version: 2

profile: 'analytics_engine' # This must match the name in your profiles.yml

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Note: Ensure two spaces for each indentation level below
models:
  analytics_engine:
    +materialized: view
    staging:
      +materialized: view
    marts:
      +materialized: table
